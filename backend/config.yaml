# TVPlayer 配置文件
# ⚠️ 部署前必须修改 auth.secret 和 auth.admin_password

server:
  host: "0.0.0.0"
  port: 9527

database:
  path: "./data/tvplayer.db"

stream:
  cache_dir: "./data/cache"
  max_concurrent: 50       # 最大并发流数
  buffer_size: 4096        # 流缓冲区大小 (bytes)
  health_check_sec: 30     # 健康检查间隔 (秒)

auth:
  # ⚠️ 必须修改！使用随机生成的长字符串
  # 生成方法: openssl rand -hex 32
  secret: "tvplayer-change-this-secret-key"
  expire_hours: 720        # JWT Token 有效期 (小时)
  # ⚠️ 必须修改！设置强密码
  admin_password: "admin123"

cors:
  # 允许的来源域名列表
  # 生产环境应限制为你的实际域名，例如:
  # allowed_origins:
  #   - "https://admin.example.com"
  #   - "http://localhost:3000"
  allowed_origins:
    - "*"
